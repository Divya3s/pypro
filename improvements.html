<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IssueDesk | Improvement reports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f6f7fb; }
    .navbar-brand span { color: #4f46e5; }
    .page-hero { background: linear-gradient(135deg, #4f46e5, #06b6d4); color: #fff; }
    .card { border: 0; box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.08); }
  </style>
</head>
<body data-report-type="Improvement">
  <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><span>Issue</span>Desk</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">New report</a></li>
          <li class="nav-item"><a class="nav-link " href="bugs.html">Bugs</a></li>
          <li class="nav-item"><a class="nav-link " href="features.html">Features</a></li>
          <li class="nav-item"><a class="nav-link " href="documentation.html">Documentation</a></li>
          <li class="nav-item"><a class="nav-link active" href="improvements.html">Improvements</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="page-hero py-5">
    <div class="container py-3">
      <p class="text-uppercase fw-semibold small mb-2">IssueDesk queue</p>
      <h1 class="display-6 fw-bold" id="pageTitle">Improvement reports</h1>
      <p class="lead mb-0" id="pageSubtitle">Loading reports...</p>
    </div>
  </header>

  <main class="container my-5">
    <div class="card">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-3">
          <h2 class="h4 mb-0">Reports</h2>
          <a class="btn btn-primary" href="index.html#report-form">Create new report</a>
        </div>
        <div id="emptyState" class="alert alert-info d-none">No reports found for this queue.</div>
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Title / area</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Assignee</th>
                <th>Updated</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="reportsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="scripts/list-page.js"></script>
</body>
</html>
